<!DOCTYPE html>
<html lang="uz">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fayoz Market Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #f8f9fc;
            color: #1e293b;
            font-size: 14px
        }

        #LP {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #0c0a1a, #1a1640, #0c0a1a);
            padding: 20px
        }

        .lbox {
            background: rgba(255, 255, 255, .07);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, .13);
            border-radius: 24px;
            padding: 42px 38px;
            width: 100%;
            max-width: 410px
        }

        .lmark {
            width: 62px;
            height: 62px;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 12px;
            font-size: 32px
        }

        .llogo {
            text-align: center;
            margin-bottom: 30px
        }

        .llogo h1 {
            color: #fff;
            font-size: 23px;
            font-weight: 800
        }

        .llogo p {
            color: rgba(255, 255, 255, .32);
            font-size: 13px;
            margin-top: 3px
        }

        .lg {
            margin-bottom: 15px
        }

        .lg label {
            display: block;
            color: rgba(255, 255, 255, .42);
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            margin-bottom: 6px
        }

        .lg input {
            width: 100%;
            padding: 12px 14px;
            background: rgba(255, 255, 255, .08);
            border: 1.5px solid rgba(255, 255, 255, .1);
            border-radius: 10px;
            color: #fff;
            font-size: 14px;
            outline: none
        }

        .lbtn {
            width: 100%;
            padding: 13px;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            color: #fff;
            border: none;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 4px
        }

        .lhint {
            text-align: center;
            color: rgba(255, 255, 255, .2);
            font-size: 11.5px;
            margin-top: 14px
        }

        #AP {
            display: none;
            min-height: 100vh
        }

        .sidebar {
            position: fixed;
            left: 0;
            top: 0;
            width: 240px;
            height: 100vh;
            background: #1e1b2e;
            padding: 20px 0;
            overflow-y: auto
        }

        .logo {
            padding: 0 20px 20px;
            display: flex;
            align-items: center;
            gap: 12px
        }

        .logo-icon {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px
        }

        .logo-text h3 {
            color: #fff;
            font-size: 15px;
            font-weight: 700
        }

        .logo-text p {
            color: rgba(255, 255, 255, .4);
            font-size: 11px
        }

        .menu-section {
            padding: 0 12px;
            margin-bottom: 20px
        }

        .menu-title {
            color: rgba(255, 255, 255, .3);
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
            padding: 8px 12px;
            letter-spacing: 1px
        }

        .menu-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 12px;
            color: rgba(255, 255, 255, .6);
            border-radius: 8px;
            cursor: pointer;
            margin-bottom: 2px;
            transition: .2s
        }

        .menu-item:hover {
            background: rgba(255, 255, 255, .05);
            color: #fff
        }

        .menu-item.active {
            background: linear-gradient(135deg, rgba(99, 102, 241, .2), rgba(139, 92, 246, .1));
            color: #a5b4fc
        }

        .menu-icon {
            font-size: 18px;
            width: 20px;
            text-align: center
        }

        .main {
            margin-left: 240px;
            padding: 20px
        }

        .topbar {
            background: #fff;
            border-radius: 12px;
            padding: 16px 20px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 16px
        }

        .search {
            flex: 1;
            max-width: 400px;
            position: relative
        }

        .search input {
            width: 100%;
            padding: 10px 16px 10px 40px;
            background: #f8f9fc;
            border: 1px solid #e2e8f0;
            border-radius: 10px;
            font-size: 13px;
            outline: none
        }

        .search-icon {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 16px;
            color: #94a3b8
        }

        .topbar-right {
            margin-left: auto;
            display: flex;
            align-items: center;
            gap: 12px
        }

        .topbar-btn {
            width: 40px;
            height: 40px;
            background: #f8f9fc;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 18px;
            display: flex;
            align-items: center;
            justify-content: center
        }

        .user-avatar {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-weight: 700;
            cursor: pointer
        }

        .page-header {
            margin-bottom: 24px
        }

        .page-title {
            font-size: 24px;
            font-weight: 800;
            margin-bottom: 4px
        }

        .page-subtitle {
            color: #64748b;
            font-size: 13px
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 16px;
            margin-bottom: 24px
        }

        .stat-card {
            background: #fff;
            border-radius: 12px;
            padding: 20px;
            display: flex;
            align-items: center;
            gap: 16px
        }

        .stat-icon {
            width: 56px;
            height: 56px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            flex-shrink: 0
        }

        .stat-icon.blue {
            background: rgba(59, 130, 246, .1);
            color: #3b82f6
        }

        .stat-icon.green {
            background: rgba(16, 185, 129, .1);
            color: #10b981
        }

        .stat-icon.purple {
            background: rgba(139, 92, 246, .1);
            color: #8b5cf6
        }

        .stat-icon.orange {
            background: rgba(245, 158, 11, .1);
            color: #f59e0b
        }

        .stat-value {
            font-size: 28px;
            font-weight: 800;
            line-height: 1
        }

        .stat-label {
            color: #64748b;
            font-size: 13px;
            margin-top: 4px
        }

        .stat-change {
            font-size: 12px;
            font-weight: 600;
            margin-top: 4px;
            color: #10b981
        }

        .card {
            background: #fff;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px
        }

        .card-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px
        }

        .card-title {
            font-size: 16px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 8px
        }

        .card-link {
            color: #6366f1;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none
        }

        .chart-container {
            height: 200px;
            display: flex;
            align-items: flex-end;
            gap: 8px;
            padding: 10px 0
        }

        .chart-bar {
            flex: 1;
            background: linear-gradient(180deg, #6366f1, #8b5cf6);
            border-radius: 6px 6px 0 0;
            position: relative;
            cursor: pointer;
            transition: .3s
        }

        .chart-bar:hover {
            opacity: .8
        }

        .chart-label {
            text-align: center;
            font-size: 11px;
            color: #94a3b8;
            margin-top: 8px
        }

        .chart-value {
            position: absolute;
            top: -20px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 11px;
            font-weight: 700;
            color: #1e293b
        }

        .grid-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px
        }

        .table {
            width: 100%;
            border-collapse: collapse
        }

        .table th {
            text-align: left;
            padding: 12px;
            font-size: 11px;
            font-weight: 700;
            color: #64748b;
            text-transform: uppercase;
            border-bottom: 2px solid #f1f5f9
        }

        .table td {
            padding: 12px;
            border-bottom: 1px solid #f8f9fc;
            font-size: 13px
        }

        .table tr:hover {
            background: #f8f9fc
        }

        .badge {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600
        }

        .badge.green {
            background: rgba(16, 185, 129, .1);
            color: #10b981
        }

        .badge.blue {
            background: rgba(59, 130, 246, .1);
            color: #3b82f6
        }

        .badge.orange {
            background: rgba(245, 158, 11, .1);
            color: #f59e0b
        }

        .badge.red {
            background: rgba(239, 68, 68, .1);
            color: #ef4444
        }

        .product-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 0;
            border-bottom: 1px solid #f8f9fc
        }

        .product-rank {
            font-size: 16px;
            font-weight: 800;
            color: #cbd5e1;
            width: 24px
        }

        .product-img {
            width: 40px;
            height: 40px;
            border-radius: 8px;
            object-fit: cover;
            background: #f1f5f9
        }

        .product-name {
            flex: 1;
            font-size: 13px;
            font-weight: 600
        }

        .product-views {
            display: flex;
            align-items: center;
            gap: 6px;
            color: #6366f1;
            font-weight: 700;
            font-size: 13px
        }

        .filter-bar {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 20px;
            flex-wrap: wrap
        }

        .filter-input {
            flex: 1;
            min-width: 200px;
            padding: 10px 16px;
            background: #fff;
            border: 1px solid #e2e8f0;
            border-radius: 10px;
            font-size: 13px;
            outline: none
        }

        .filter-select {
            padding: 10px 16px;
            background: #fff;
            border: 1px solid #e2e8f0;
            border-radius: 10px;
            font-size: 13px;
            outline: none;
            cursor: pointer
        }

        .btn-primary {
            padding: 10px 20px;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            color: #fff;
            border: none;
            border-radius: 10px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 6px
        }

        .btn-primary:hover {
            opacity: .9
        }

        .user-cell {
            display: flex;
            align-items: center;
            gap: 12px
        }

        .user-avatar-sm {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-weight: 700;
            font-size: 14px;
            flex-shrink: 0
        }

        .user-info h4 {
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 2px
        }

        .user-info p {
            font-size: 12px;
            color: #94a3b8
        }

        .action-btns {
            display: flex;
            gap: 6px
        }

        .action-btn {
            width: 32px;
            height: 32px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: .2s
        }

        .action-btn.view {
            background: rgba(59, 130, 246, .1);
            color: #3b82f6
        }

        .action-btn.edit {
            background: rgba(245, 158, 11, .1);
            color: #f59e0b
        }

        .action-btn.delete {
            background: rgba(239, 68, 68, .1);
            color: #ef4444
        }

        .action-btn:hover {
            opacity: .8
        }

        .menu-toggle {
            display: none;
            font-size: 20px;
            cursor: pointer
        }

        @media(max-width:768px) {
            .menu-toggle {
                display: block
            }

            .sidebar {
                width: 70px
            }

            .sidebar .logo-text,
            .sidebar .menu-title,
            .sidebar .menu-item span {
                display: none
            }

            .main {
                margin-left: 70px
            }

            .stats-grid {
                grid-template-columns: 1fr 1fr
            }

            .grid-2 {
                grid-template-columns: 1fr
            }
        }
    </style>
</head>
