<!DOCTYPE html>
<html lang="uz">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DevFlow OS + Calculator | Farruxbek</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: #05070a;
            color: #e2e8f0;
            overflow: hidden;
            height: 100vh;
        }

        .glass {
            background: rgba(17, 25, 40, 0.8);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .page-container {
            height: calc(100vh - 80px);
            overflow-y: auto;
            padding-bottom: 50px;
        }

        .page {
            display: none;
        }

        .page.active {
            display: block;
            animation: fadeIn 0.4s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }

        /* Lock Screen PIN Styles */
        .keypad-btn {
            background: rgba(255, 255, 255, 0.05);
            transition: all 0.2s;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .keypad-btn:active {
            background: #3b82f6;
            transform: scale(0.9);
        }

        .dot {
            width: 15px;
            height: 15px;
            border: 2px solid #3b82f6;
            border-radius: 50%;
            transition: all 0.2s;
        }

        .dot.active {
            background: #3b82f6;
            box-shadow: 0 0 15px #3b82f6;
        }

        /* Calculator Styles */
        .calc-btn {
            height: 70px;
            border-radius: 20px;
            font-size: 1.25rem;
            font-weight: bold;
            transition: all 0.2s;
            background: rgba(255, 255, 255, 0.05);
        }

        .calc-btn:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .calc-btn.op {
            background: #3b82f6;
            color: white;
        }

        .calc-btn.op:hover {
            background: #2563eb;
        }

        .calc-display {
            background: rgba(0, 0, 0, 0.3);
            padding: 20px;
            border-radius: 20px;
            text-align: right;
            font-size: 2rem;
            font-weight: 800;
            margin-bottom: 20px;
            overflow: hidden;
        }

        .sidebar-item.active {
            background: #3b82f6;
            color: white;
        }

        /* --- Skrollbar uchun chiroyli va zamonaviy stil --- */

        /* 1. Skrollbarning umumiy o'lchami va foni */
        ::-webkit-scrollbar {
            width: 8px;
            /* Eni (ixchamroq) */
            background: transparent;
            /* Fon shaffof bo'lsin */
        }

        /* 2. Skrollbarning harakatlanuvchi qismi (Thumb) */
        ::-webkit-scrollbar-thumb {
            background: rgba(59, 130, 246, 0.4);
            /* Moviy (blue-500) rang, biroz shaffof */
            border-radius: 20px;
            /* Burchaklarni to'liq yumaloq qilish */
            border: 2px solid transparent;
            /* Atrofidagi bo'shliqni ta'minlash */
            background-clip: content-box;
            /* Border va thumb o'rtasidagi farq */
            transition: background 0.3s ease;
            /* Silliq o'tish effekti */
        }

        /* 3. Thumb ustiga sichqoncha borgandagi holat (Hover) */
        ::-webkit-scrollbar-thumb:hover {
            background: #3b82f6;
            /* Yorqin moviy rang */
            box-shadow: 0 0 10px rgba(59, 130, 246, 0.6);
            /* Neon porlash effekti */
        }

        /* 4. Skrollbarning teppa va pastki tugmalari (Odatda zamonaviy dizaynda yashiriladi) */
        ::-webkit-scrollbar-button {
            display: none;
            /* Bu tugmalarni yashirib qo'yamiz */
        }

        /* 5. Skrollbar yo'li (Track) */
        ::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.03);
            /* Juda yengil, deyarli ko'rinmas fon */
            border-radius: 20px;
        }
    </style>
</head>

<body class="flex">

    <div id="lockScreen" class="fixed inset-0 z-[2000] bg-slate-950 flex items-center justify-center">
        <div class="w-full max-w-sm p-8 text-center">
            <div class="mb-8">
                <div
                    class="w-20 h-20 bg-blue-600 rounded-3xl flex items-center justify-center mx-auto mb-4 shadow-2xl shadow-blue-500/30">
                    <i class="fas fa-fingerprint text-white text-3xl"></i>
                </div>
                <h1 id="lockStatus" class="text-2xl font-black">Xush kelibsiz</h1>
                <p id="lockHint" class="text-gray-500 text-sm mt-2">Ism kiriting va 4 xonali PIN o'rnating</p>
            </div>
            <input type="text" id="authName" placeholder="Ismingiz"
                class="w-full bg-white/5 border border-white/10 p-4 rounded-2xl mb-6 text-center outline-none focus:border-blue-500">
            <div class="flex justify-center space-x-4 mb-8" id="pinDots">
                <div class="dot"></div>
                <div class="dot"></div>
                <div class="dot"></div>
                <div class="dot"></div>
            </div>
            <div class="grid grid-cols-3 gap-4 max-w-[280px] mx-auto">
                <button onclick="pressPin('1')" class="keypad-btn w-16 h-16 rounded-full text-xl font-bold">1</button>
                <button onclick="pressPin('2')" class="keypad-btn w-16 h-16 rounded-full text-xl font-bold">2</button>
                <button onclick="pressPin('3')" class="keypad-btn w-16 h-16 rounded-full text-xl font-bold">3</button>
                <button onclick="pressPin('4')" class="keypad-btn w-16 h-16 rounded-full text-xl font-bold">4</button>
                <button onclick="pressPin('5')" class="keypad-btn w-16 h-16 rounded-full text-xl font-bold">5</button>
                <button onclick="pressPin('6')" class="keypad-btn w-16 h-16 rounded-full text-xl font-bold">6</button>
                <button onclick="pressPin('7')" class="keypad-btn w-16 h-16 rounded-full text-xl font-bold">7</button>
                <button onclick="pressPin('8')" class="keypad-btn w-16 h-16 rounded-full text-xl font-bold">8</button>
                <button onclick="pressPin('9')" class="keypad-btn w-16 h-16 rounded-full text-xl font-bold">9</button>
                <div></div>
                <button onclick="pressPin('0')" class="keypad-btn w-16 h-16 rounded-full text-xl font-bold">0</button>
                <button onclick="clearPin()" class="w-16 h-16 rounded-full text-gray-500"><i
                        class="fas fa-backspace"></i></button>
            </div>
            <button onclick="tryLogin()"
                class="mt-8 text-blue-500 font-bold uppercase tracking-widest text-xs">Kirish</button>
        </div>
    </div>

    <aside class="w-20 lg:w-72 border-r border-white/5 flex flex-col p-4 bg-[#05070a]">
        <div class="mb-10 px-4 mt-4 font-black text-xl lg:block hidden">DEV<span class="text-blue-500">FLOW</span></div>
        <nav class="flex-1 space-y-2">
            <button onclick="showPage('dash')" id="btn-dash"
                class="sidebar-item active w-full flex items-center p-4 rounded-2xl space-x-4"><i
                    class="fas fa-chart-line"></i> <span class="hidden lg:block">Dashboard</span></button>
            <button onclick="showPage('pro')" id="btn-pro"
                class="sidebar-item w-full flex items-center p-4 rounded-2xl space-x-4"><i class="fas fa-folder"></i>
                <span class="hidden lg:block">Loyihalar</span></button>
            <button onclick="showPage('calc')" id="btn-calc"
                class="sidebar-item w-full flex items-center p-4 rounded-2xl space-x-4"><i
                    class="fas fa-calculator"></i> <span class="hidden lg:block">Kalkulyator</span></button>
            <button onclick="logout()" class="w-full flex items-center p-4 rounded-2xl space-x-4 text-red-500 mt-10"><i
                    class="fas fa-power-off"></i> <span class="hidden lg:block">Chiqish</span></button>
        </nav>
    </aside>

    <main class="flex-1 flex flex-col min-w-0">
        <header class="h-20 flex items-center justify-between px-8 border-b border-white/5 bg-[#05070a]">
            <h2 id="headerTitle" class="font-bold">Dashboard</h2>
            <div id="userInfo" class="flex items-center space-x-3">
                <span id="uNameDisplay" class="font-bold text-sm"></span>
                <div class="w-10 h-10 rounded-full bg-blue-600 flex items-center justify-center font-bold" id="uAvatar">
                </div>
            </div>
        </header>

        <div class="page-container p-8">
            <section id="page-dash" class="page active">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8">
                    <div class="glass p-8 rounded-[2rem]">
                        <p class="text-gray-500 text-xs font-bold uppercase mb-2">Jami Budjet</p>
                        <h2 id="totalBudget" class="text-4xl font-black text-green-400">$0</h2>
                    </div>
                    <div class="glass p-8 rounded-[2rem]">
                        <p class="text-gray-500 text-xs font-bold uppercase mb-2">Sana</p>
                        <h2 id="liveTime" class="text-2xl font-black"></h2>
                    </div>
                </div>
                <div class="glass p-8 rounded-[2.5rem]">
                    <h3 class="font-bold mb-4">Oxirgi harakatlar</h3>
                    <div id="logs" class="space-y-2 text-sm text-gray-500"></div>
                </div>
            </section>

            <section id="page-pro" class="page">
                <div class="flex justify-between items-center mb-8">
                    <h2 class="text-2xl font-black">Loyihalar</h2>
                    <button onclick="openModal()" class="bg-blue-600 px-6 py-3 rounded-xl font-bold">+ Qo'shish</button>
                </div>
                <div id="projectGrid" class="grid grid-cols-1 md:grid-cols-2 gap-6"></div>
            </section>

            <section id="page-calc" class="page">
                <div class="max-w-xs mx-auto glass p-6 rounded-[2.5rem]">
                    <div id="calcScreen" class="calc-display">0</div>
                    <div class="grid grid-cols-4 gap-3">
                        <button onclick="calcClear()" class="calc-btn text-red-500">C</button>
                        <button onclick="calcOp('/')" class="calc-btn op">/</button>
                        <button onclick="calcOp('*')" class="calc-btn op">×</button>
                        <button onclick="calcDel()" class="calc-btn"><i class="fas fa-backspace"></i></button>

                        <button onclick="calcNum('7')" class="calc-btn">7</button>
                        <button onclick="calcNum('8')" class="calc-btn">8</button>
                        <button onclick="calcNum('9')" class="calc-btn">9</button>
                        <button onclick="calcOp('-')" class="calc-btn op">-</button>

                        <button onclick="calcNum('4')" class="calc-btn">4</button>
                        <button onclick="calcNum('5')" class="calc-btn">5</button>
                        <button onclick="calcNum('6')" class="calc-btn">6</button>
                        <button onclick="calcOp('+')" class="calc-btn op">+</button>

                        <button onclick="calcNum('1')" class="calc-btn">1</button>
                        <button onclick="calcNum('2')" class="calc-btn">2</button>
                        <button onclick="calcNum('3')" class="calc-btn">3</button>
                        <button onclick="calcRes()" class="calc-btn op row-span-2">=</button>

                        <button onclick="calcNum('0')" class="calc-btn col-span-2">0</button>
                        <button onclick="calcNum('.')" class="calc-btn">.</button>
                    </div>
                </div>
            </section>
        </div>
    </main>

    <div id="pModal" class="hidden fixed inset-0 bg-black/90 z-[3000] flex items-center justify-center p-4">
        <div class="glass p-8 rounded-[2.5rem] w-full max-w-sm">
            <h2 class="text-xl font-black mb-6">Yangi loyiha</h2>
            <input type="text" id="pn" placeholder="Loyiha nomi"
                class="w-full p-4 rounded-xl bg-slate-900 mb-4 border border-white/10 outline-none">
            <input type="number" id="pb" placeholder="Summa ($)"
                class="w-full p-4 rounded-xl bg-slate-900 mb-6 border border-white/10 outline-none">
            <button onclick="addProject()" class="w-full bg-blue-600 py-4 rounded-xl font-bold">Saqlash</button>
            <button onclick="closeModal()" class="w-full text-gray-500 mt-4 text-sm">Yopish</button>
        </div>
    </div>

    <script>
        let pin = "";
        let user = null;
        let accounts = JSON.parse(localStorage.getItem('dev_accounts_v2')) || {};

        // AUTH
        function pressPin(n) { if (pin.length < 4) { pin += n; updateDots(); } }
        function clearPin() { pin = pin.slice(0, -1); updateDots(); }
        function updateDots() {
            const dots = document.querySelectorAll('.dot');
            dots.forEach((d, i) => i < pin.length ? d.classList.add('active') : d.classList.remove('active'));
        }

        function tryLogin() {
            const name = document.getElementById('authName').value;
            if (!name || pin.length < 4) return alert("To'liq to'ldiring!");
            if (!accounts[name]) {
                accounts[name] = { pin: pin, projects: [], logs: [] };
                alert("Yangi akkaunt ochildi!");
            } else if (accounts[name].pin !== pin) {
                pin = ""; updateDots(); return alert("Xato PIN!");
            }
            user = name;
            localStorage.setItem('dev_accounts_v2', JSON.stringify(accounts));
            document.getElementById('lockScreen').style.display = 'none';
            init();
        }

        // CALCULATOR LOGIC
        let calcVal = "0";
        function calcNum(n) {
            if (calcVal === "0") calcVal = n;
            else calcVal += n;
            updateCalc();
        }
        function calcOp(o) { calcVal += o; updateCalc(); }
        function calcClear() { calcVal = "0"; updateCalc(); }
        function calcDel() { calcVal = calcVal.length > 1 ? calcVal.slice(0, -1) : "0"; updateCalc(); }
        function calcRes() { try { calcVal = eval(calcVal).toString(); } catch { calcVal = "Xato"; } updateCalc(); }
        function updateCalc() { document.getElementById('calcScreen').innerText = calcVal; }

        // APP LOGIC
        function showPage(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById('page-' + id).classList.add('active');
            document.querySelectorAll('.sidebar-item').forEach(b => b.classList.remove('active'));
            document.getElementById('btn-' + id).classList.add('active');
            document.getElementById('headerTitle').innerText = id.toUpperCase();
        }

        function openModal() { document.getElementById('pModal').classList.remove('hidden'); }
        function closeModal() { document.getElementById('pModal').classList.add('hidden'); }

        function addProject() {
            const n = document.getElementById('pn').value, b = document.getElementById('pb').value;
            if (n && b) {
                accounts[user].projects.unshift({ id: Date.now(), name: n, budget: b });
                accounts[user].logs.unshift(`${new Date().toLocaleTimeString()}: ${n} qo'shildi`);
                save(); render(); closeModal();
            }
        }

        function render() {
            const grid = document.getElementById('projectGrid');
            const logBox = document.getElementById('logs');
            grid.innerHTML = ''; logBox.innerHTML = '';
            let total = 0;
            accounts[user].projects.forEach(p => {
                total += Number(p.budget);
                grid.innerHTML += `<div class="glass p-6 rounded-[2rem] flex justify-between items-center">
                    <div><h3 class="font-black">${p.name}</h3></div>
                    <div class="text-right"><p class="text-green-400 font-bold">$${p.budget}</p>
                    <button onclick="del(${p.id})" class="text-red-500 text-xs mt-2"><i class="fas fa-trash"></i></button></div>
                </div>`;
            });
            accounts[user].logs.slice(0, 10).forEach(l => logBox.innerHTML += `<div>● ${l}</div>`);
            document.getElementById('totalBudget').innerText = '$' + total.toLocaleString();
            document.getElementById('uNameDisplay').innerText = user;
            document.getElementById('uAvatar').innerText = user[0].toUpperCase();
        }

        function del(id) { accounts[user].projects = accounts[user].projects.filter(p => p.id !== id); save(); render(); }
        function save() { localStorage.setItem('dev_accounts_v2', JSON.stringify(accounts)); }
        function logout() { location.reload(); }
        function init() {
            setInterval(() => { document.getElementById('liveTime').innerText = new Date().toLocaleString('uz-UZ'); }, 1000);
            render();
        }
    </script>
</body>

</html>
