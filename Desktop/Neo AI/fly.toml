# Fly.io konfiguratsiyasi
app = "neo-ai-bot"
primary_region = "ams"  # Amsterdam (Telegram'ga yaqin)

[build]
  dockerfile = "Dockerfile"

[env]
  NODE_ENV = "production"

[[services]]
  internal_port = 3000
  protocol = "tcp"
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

[checks]
  [checks.alive]
    type = "tcp"
    interval = "30s"
    timeout = "5s"
    port = 3000
